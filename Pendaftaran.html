<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMRS - Pendaftaran</title>
    <link rel="stylesheet" href="index.css" />
</head>
<body>
    <header class="header-menu">
        <div class="title">
            <h4>SIMRS</h4>
        </div>
        <div class="menu">
            <a href="/index.html">Home</a>
            <a href="/pengguna.html">Pengguna</a>
            <a class="active" href="/Pendaftaran.html">Pendaftaran</a>
            <a href="/Rawat Jalan.html">Rawat Jalan</a>
        </div>
        <div class="button-auth">
            <button>Logout</button>
        </div>
    </header>
    <div class="container">
    <h2 class="Pendaftaran">FORM PENDAFTARAN PASIEN</h2>

    <form>
        <table class="form">
            <tr>
                <td>Nama Pasien</td>
                <td>:</td>
                <td><input type="text" name="nama_pasien"></td>
            </tr>

            <tr>
                <td>No RM</td>
                <td>:</td>
                <td><input type="text" name="no_rm"></td>
            </tr>

            <tr>
                <td>NIK</td>
                <td>:</td>
                <td><input type="text" name="nik"></td>
            </tr>

            <tr>
                <td>Tanggal Lahir</td>
                <td>:</td>
                <td><input type="date" name="tanggal_lahir"></td>
            </tr>

            <tr>
                <td>Tujuan Poliklinik</td>
                <td>:</td>
                <td>
                    <select name="tujuan_poli">
                        <option>Poli Umum</option>
                        <option>Poli Gigi</option>
                        <option>Poli Anak</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Dokter Poliklinik</td>
                <td>:</td>
                <td><input type="text" name="dokter_poli"></td>
            </tr>

            <tr>
                <td colspan="3" align="center">
                    <button type="submit">Simpan</button>
                </td>
            </tr>
        </table>
    </form>
</div>
</body>
</html>
